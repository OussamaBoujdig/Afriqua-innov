spring:
  datasource:
    url: jdbc:mysql://localhost:3306/innovhub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: 8081
  servlet:
    context-path: /api/v1

jwt:
  secret: ${JWT_SECRET:InnovHubSecretKey2024MustBe256BitsLongForSecurity!!}
  access-expiration: 86400000
  refresh-expiration: 604800000

file:
  upload-dir: ${UPLOAD_DIR:./uploads}s

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:3002

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
